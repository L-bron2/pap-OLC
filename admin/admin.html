<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Gestao de Utilizadores</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="../favicon/Favicon final.png" type="image/x-icon" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
  <div class="main">
    <nav>
      <a href="../inicio/inicio.html" class="logo">
        <img src="../favicon/Favicon final.png" alt="Logo Trovix">
        <span>Trovix</span>
      </a>

      <div class="nav-right">
        <ul class="navbar-links">
          <li>
            <a href="admin.html" class="active" title="Admin">
              <span class="material-symbols-outlined">manage_accounts</span>
            </a>
          </li>
          <li>
            <a href="../inicio/inicio.html" title="Inicio">
              <span class="material-symbols-outlined">home</span>
            </a>
          </li>
          <li>
            <a href="../conversas/chat.html" title="Conversas">
              <span class="material-symbols-outlined">chat</span>
            </a>
          </li>
          <li>
            <a href="../favoritos/favoritos.html" title="Favoritos">
              <span class="material-symbols-outlined">favorite</span>
            </a>
          </li>
          <li>
            <a href="../Perfil/perfil.html" title="Perfil">
              <span class="material-symbols-outlined">account_circle</span>
            </a>
          </li>
        </ul>

        <div class="pesquisa">
          <input id="search" placeholder="Pesquisar por nome, email ou id" />
        </div>
      </div>
    </nav>

    <h1>Admin - Gestão de Contas</h1>

    <main>
      <section id="usersList" class="users-list"></section>

      <aside id="userDetail" class="user-detail" style="display: none">
        <button id="fecharDetalhes" class="fechar-btn">×</button>
        <h2 id="detailName"></h2>
        <p id="detailEmail"></p>
        <p id="detailRole"></p>
        <button id="deleteUser" class="danger">Apagar conta</button>

        <h3>Produtos do utilizador</h3>
        <div id="userProducts" class="products-list"></div>
      </aside>
    </main>

    <div id="alerta" class="alerta" style="display: none"></div>
  </div>

  <script src="../config.js"></script>
  <script src="../shared/alerts.js"></script>
  <script src="../shared/admin-link.js"></script>
  <script src="admin.js"></script>
</body>

</html>
