<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início</title>
  <link rel="stylesheet" href="inicio.css" />
  <link rel="icon" href="../favicon/Favicon final.png" type="image/x-icon" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
  <div class="main">
    <!-- NAV -->
    <nav>
      <a href="../inicio/inicio.html" class="logo">Trovix</a>
      <div class="nav-right">
        <ul class="navbar-links">
          <li id="area_admin">
            <a href="../admin/admin.html" class="admin-link hidden">
              <span class="material-symbols-outlined">manage_accounts</span>
            </a>
          </li>
          <li><a href="../inicio/inicio.html"><span class="material-symbols-outlined" id="home">home</span></a></li>
          <li><a href="../conversas/chat.html"><span class="material-symbols-outlined" id="chat">chat</span></a></li>
          <li><a href="../favoritos/favoritos.html"><span class="material-symbols-outlined" id="favorito">favorite</span></a></li>
          <li><a href="../Perfil/perfil.html"><span class="material-symbols-outlined" id="perfil">account_circle</span></a></li>
        </ul>
        <!-- pesquisa -->
        <input type="text" placeholder="Procurar produtos..." class="Procurar" id="pesquisar" />
        <button class="filtro" id="filtro" title="Filtros avançados">
          <span class="material-symbols-outlined">manage_search</span>
        </button>
      </div>
    </nav>

    <!-- LOADING -->
    <div id="loading" class="loading-container">
      <div class="loading-spinner">
        <span class="material-symbols-outlined">hourglass_empty</span>
        <p>Carregando produtos...</p>
      </div>
    </div>

    <!-- PRODUTOS -->
    <div id="produtos-container" class="Produtos"></div>

    <!-- botão novo produto -->
    <a href="../produtos/novo_produto.html">
      <button class="BTN_Produto" title="Criar novo produto">
        <span class="material-symbols-outlined">add</span>
        Novo produto
      </button>
    </a>

    <!-- PAGINAÇÃO -->
    <div id="Pages" class="Pages"></div>

    <!-- MODAL -->
    <div id="caixaFlutuante" class="caixaFlutuante">
      <div class="detalhes">
        <button id="fechar" class="fechar" title="Fechar">
          <span class="material-symbols-outlined">close</span>
        </button>
        <div class="modal-body">
          <div class="modal-image-wrap">
            <img id="modalImagem" class="modal-img" src="" alt="Imagem do produto" />
          </div>
          <div class="modal-content">
            <h2 id="nome"></h2>
            <p id="Preco" class="modal-preco"></p>
            <p id="descricao"></p>
            <p id="vendedor"></p>
            <div class="modal-actions">
              <button id="BTN" class="BTN">Conversar com o vendedor</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DE FILTRO -->
    <div id="modalFiltro" class="modal-filtro">
      <div class="filtro-container">
        <div class="filtro-header">
          <h3>🔍 Filtros</h3>
          <button id="fecharFiltro" class="fechar-filtro">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <form class="filtro-form">
          <div class="filtro-campo">
            <label for="categoriaFiltro">Categoria</label>
            <select id="categoriaFiltro"></select>
          </div>

          <div class="filtro-precos">
            <div class="filtro-campo">
              <label for="precoMinimo">Mín. (€)</label>
              <input type="number" id="precoMinimo" min="0" step="0.01" placeholder="0">
            </div>
            <div class="filtro-campo">
              <label for="precoMaximo">Máx. (€)</label>
              <input type="number" id="precoMaximo" min="0" step="0.01" placeholder="∞">
            </div>
          </div>

          <div class="filtro-botoes">
            <button type="button" id="limparFiltros" class="btn-secundario">Limpar</button>
            <button type="button" id="aplicarFiltros" class="btn-primario">Aplicar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ALERTA -->
    <div class="alerta" id="alerta"></div>
  </div>

  <script src="../config.js"></script>
  <script src="../shared/alerts.js"></script>
  <script src="../shared/admin-link.js"></script>
  <script src="inicio.js"></script>
</body>

</html>
